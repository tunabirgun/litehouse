name: Publish updater-signed alpha

on:
  push:
    tags: ["v*-alpha.*"]

permissions:
  contents: read

concurrency:
  group: litehouse-alpha-updater
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    timeout-minutes: 90
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      # tauri-action merges latest.json with the manifest already on the release.
      # Serial publication prevents two matrix jobs from overwriting each other.
      max-parallel: 1
      matrix:
        include:
          - label: macOS ARM64
            runner: macos-15
            target: aarch64-apple-darwin
            bundles: app,dmg
            experimental: false
          - label: macOS Intel
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundles: app,dmg
            experimental: false
          - label: Windows x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            experimental: false
          - label: Windows ARM64 preview
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis
            experimental: true
          - label: Linux x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            experimental: false
          - label: Linux ARM64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: appimage,deb
            experimental: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 25.9.0
          cache: npm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13.13
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.96.1
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target
          cache-on-failure: false
      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install pinned dependencies
        run: |
          python -m pip install uv==0.11.28
          uv sync --frozen --all-groups
          npm ci --ignore-scripts
      - name: Build and verify target-native sidecar
        shell: bash
        run: |
          uv run python scripts/build_sidecar.py --target "${{ matrix.target }}"
          uv run python scripts/smoke_sidecar.py --target "${{ matrix.target }}" --data-dir "$RUNNER_TEMP/litehouse-sidecar-smoke"
      - name: Materialize signed updater configuration
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: uv run python scripts/write_release_config.py "$RUNNER_TEMP/tauri-release.json"
      - name: Build, updater-sign, and upload native packages
        id: tauri
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LITEHOUSE_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: Litehouse __VERSION__
          releaseBody: Alpha release. Verify the published SHA-256 records before installation.
          releaseDraft: false
          prerelease: true
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][_setup].[ext]"
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config ${{ runner.temp }}/tauri-release.json
      - name: Write artifact checksums
        shell: bash
        run: uv run python scripts/hash_artifacts.py "src-tauri/target/${{ matrix.target }}/release/bundle" "SHA256SUMS-${{ matrix.target }}.txt"
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: src-tauri/target/${{ matrix.target }}/release/bundle
          format: spdx-json
          output-file: litehouse-${{ matrix.target }}.spdx.json
          artifact-name: litehouse-${{ matrix.target }}-sbom
          syft-version: v1.46.0
          upload-artifact: false
          upload-release-assets: false
      - name: Attest native packages
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: src-tauri/target/${{ matrix.target }}/release/bundle/**/*
      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-metadata-${{ matrix.target }}
          path: |
            SHA256SUMS-${{ matrix.target }}.txt
            litehouse-${{ matrix.target }}.spdx.json
          if-no-files-found: error
          retention-days: 30

  publish-metadata:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-metadata-*
          path: release-metadata
          merge-multiple: true
      - name: Upload checksums and SBOMs to the prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" release-metadata/* --clobber
      - name: Download and verify the merged signed updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir updater-manifest
          gh release download "$GITHUB_REF_NAME" --pattern latest.json --dir updater-manifest
          test "$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" --jq .prerelease)" = true
          version="${GITHUB_REF_NAME#v}"
          jq -e --arg version "$version" --arg tag "$GITHUB_REF_NAME" '
            . as $manifest |
            $manifest.version == $version and
            (["darwin-aarch64", "darwin-x86_64", "linux-aarch64", "linux-x86_64", "windows-x86_64"]
              | all(. as $platform | $manifest.platforms | has($platform))) and
            all($manifest.platforms[];
              (.signature | type == "string" and length > 0) and
              (.url | type == "string" and startswith("https://github.com/tunabirgun/litehouse/releases/download/" + $tag + "/")))
          ' updater-manifest/latest.json
      - name: Publish the stable updater-channel asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view updater >/dev/null 2>&1; then
            gh release edit updater \
              --title "Litehouse signed updater channel" \
              --notes "Mutable prerelease channel metadata. Installers remain on their immutable versioned alpha releases." \
              --prerelease \
              --latest=false
          else
            gh release create updater \
              --target "$GITHUB_SHA" \
              --title "Litehouse signed updater channel" \
              --notes "Mutable prerelease channel metadata. Installers remain on their immutable versioned alpha releases." \
              --prerelease \
              --latest=false
          fi
          gh release upload updater updater-manifest/latest.json --clobber
