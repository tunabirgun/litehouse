name: Verify alpha

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 25.9.0
          cache: npm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.13.13
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.96.1
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri -> target
          cache-on-failure: false
      - name: Install Linux desktop libraries
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install pinned dependencies
        run: |
          python -m pip install uv==0.11.28
          uv sync --frozen --all-groups
          npm ci --ignore-scripts
      - name: Verify Python and web sources
        run: |
          uv run ruff check src scripts
          uv run mypy src/litehouse scripts
          npm run typecheck
          npm run build
      - name: Verify Rust shell
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml --locked
      - name: Build and smoke-test backend sidecar
        run: |
          uv run python scripts/build_sidecar.py --target x86_64-unknown-linux-gnu
          uv run python scripts/smoke_sidecar.py --target x86_64-unknown-linux-gnu --data-dir "$RUNNER_TEMP/litehouse-sidecar-smoke"
      - name: Build Linux alpha package
        run: npm run desktop:build -- --target x86_64-unknown-linux-gnu --bundles deb
