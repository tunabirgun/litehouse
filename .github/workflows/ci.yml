name: Verify web alpha

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 25.9.0
          cache: npm
      - name: Install pinned dependencies
        run: npm ci --ignore-scripts
      - name: Verify public web sources
        run: |
          npm run typecheck
          npm run build
          npm audit --omit=dev --audit-level=high || echo "::warning::npm audit reported advisories; not blocking verification."
      - name: Verify GitHub Pages artifact
        run: |
          test -f web/dist/index.html
          test -f web/dist/manifest.webmanifest
          test -f web/dist/sw.js
          grep -Fq '/litehouse/assets/' web/dist/index.html
          grep -Fq '"start_url": "./#/today"' web/dist/manifest.webmanifest
          grep -Fq '__LITEHOUSE_CACHE_VERSION__' web/dist/sw.js
