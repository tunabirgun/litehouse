name: Deploy web alpha

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 25.9.0
          cache: npm
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Build static application
        run: |
          npm ci --ignore-scripts
          npm audit --omit=dev --audit-level=high || echo "::warning::npm audit reported advisories; not blocking the deploy."
          npm run build
          sed -i "s/__LITEHOUSE_CACHE_VERSION__/${GITHUB_SHA}/g" web/dist/sw.js
          grep -Fq "litehouse-shell-${GITHUB_SHA}" web/dist/sw.js
          find web/dist -name .DS_Store -delete
          printf '%s\n' "$GITHUB_SHA" > web/dist/SOURCE_COMMIT
          (cd web/dist && find . -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt)
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
